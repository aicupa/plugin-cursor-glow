<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cursor Glow Configuration</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 16px;
      margin: 0;
      background: transparent;
      color: #e0e0e0;
      overflow-y: auto;
    }

    body::-webkit-scrollbar {
      width: 4px;
    }

    body::-webkit-scrollbar-thumb {
      background: #2d2d3d;
      border-radius: 2px;
    }

    .config-card {
      background: #1e1e24;
      border: 1px solid #2d2d3d;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 320px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #8c8c8c;
      border-bottom: 1px solid #2d2d3d;
      padding-bottom: 8px;
    }

    .section-title {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .radio-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #141416;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s ease;
    }

    .radio-label:hover {
      border-color: rgba(0, 163, 255, 0.3);
      background: rgba(0, 163, 255, 0.02);
    }

    .radio-label.active {
      border-color: #00a3ff;
      background: rgba(0, 163, 255, 0.05);
      color: #fff;
    }

    .radio-label input {
      display: none;
    }

    .mode-desc {
      font-size: 11px;
      color: #666;
      margin-top: 2px;
    }

    .status-bar {
      font-size: 11px;
      color: #00a3ff;
      text-align: right;
      font-weight: 500;
      margin-top: 4px;
    }

    .divider {
      height: 1px;
      background: #2d2d3d;
      margin: 6px 0;
    }
  </style>
</head>

<body>

  <div class="config-card">
    <div class="card-header">
      <span>✨ FX Particle Controller</span>
    </div>

    <div class="section-title">Hover Motion Trail</div>
    <div class="radio-group">
      <label class="radio-label" id="lbl-move-quantum">
        <div>
          <div>Quantum Trail</div>
          <div class="mode-desc">Standard high-tech linear fading sparks</div>
        </div>
        <input type="radio" name="move-fx" value="quantum" onchange="switchMoveFX('quantum')">
      </label>

      <label class="radio-label" id="lbl-move-float">
        <div>
          <div>Anti-Gravity</div>
          <div class="mode-desc">Particles float upward gently like cyber smoke</div>
        </div>
        <input type="radio" name="move-fx" value="float" onchange="switchMoveFX('float')">
      </label>

      <label class="radio-label" id="lbl-move-burst">
        <div>
          <div>Supernova Burst</div>
          <div class="mode-desc">Explosive high-velocity matrix radiation</div>
        </div>
        <input type="radio" name="move-fx" value="burst" onchange="switchMoveFX('burst')">
      </label>
    </div>

    <div class="divider"></div>

    <div class="section-title">Click Trigger Action</div>
    <div class="radio-group">
      <label class="radio-label" id="lbl-click-none">
        <div>
          <div>Disabled</div>
          <div class="mode-desc">No visual response upon clicking</div>
        </div>
        <input type="radio" name="click-fx" value="none" onchange="switchClickFX('none')">
      </label>

      <label class="radio-label" id="lbl-click-ripple">
        <div>
          <div>Cyber Ripple</div>
          <div class="mode-desc">Neon shockwave expanding from the core</div>
        </div>
        <input type="radio" name="click-fx" value="ripple" onchange="switchClickFX('ripple')">
      </label>

      <label class="radio-label" id="lbl-click-sparks">
        <div>
          <div>Quantum Sparkle</div>
          <div class="mode-desc">Circular explosion of digital rings</div>
        </div>
        <input type="radio" name="click-fx" value="sparks" onchange="switchClickFX('sparks')">
      </label>
    </div>

    <div class="status-bar" id="status-text">MATRIX ONLINE</div>
  </div>

  <script>
    // 初始化同步缓存
    const currentMoveFX = localStorage.getItem("aicupa_cursor_fx") || "quantum";
    const currentClickFX = localStorage.getItem("aicupa_cursor_click_fx") || "ripple";

    document.querySelector(`input[name="move-fx"][value="${currentMoveFX}"]`).checked = true;
    document.getElementById(`lbl-move-${currentMoveFX}`).classList.add("active");

    document.querySelector(`input[name="click-fx"][value="${currentClickFX}"]`).checked = true;
    document.getElementById(`lbl-click-${currentClickFX}`).classList.add("active");

    function switchMoveFX(type) {
      document.querySelectorAll('label[id^="lbl-move-"]').forEach(el => el.classList.remove('active'));
      document.getElementById(`lbl-move-${type}`).classList.add("active");
      localStorage.setItem("aicupa_cursor_fx", type);
      window.parent.postMessage({ type: 'plugin-call', method: 'syncCursorFXType', fx: type }, '*');
      triggerStatusBar("TRAIL CONFIG CHANGED");
    }

    function switchClickFX(type) {
      document.querySelectorAll('label[id^="lbl-click-"]').forEach(el => el.classList.remove('active'));
      document.getElementById(`lbl-click-${type}`).classList.add("active");
      localStorage.setItem("aicupa_cursor_click_fx", type);
      window.parent.postMessage({ type: 'plugin-call', method: 'syncCursorClickFXType', fx: type }, '*');
      triggerStatusBar("CLICK FX CONFIG CHANGED");
    }

    function triggerStatusBar(txt) {
      const status = document.getElementById("status-text");
      status.innerText = txt;
      setTimeout(() => { status.innerText = "MATRIX ONLINE"; }, 1500);
    }
  </script>
</body>

</html>
