<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cursor Glow Configuration</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 16px;
      margin: 0;
      background: transparent;
      color: #e0e0e0;
      overflow: hidden;
    }

    .config-card {
      background: #1e1e24;
      border: 1px solid #2d2d3d;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-width: 320px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #8c8c8c;
      border-bottom: 1px solid #2d2d3d;
      padding-bottom: 8px;
    }

    .section-title {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .radio-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #141416;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s ease;
    }

    .radio-label:hover {
      border-color: rgba(0, 163, 255, 0.3);
      background: rgba(0, 163, 255, 0.02);
    }

    .radio-label.active {
      border-color: #00a3ff;
      background: rgba(0, 163, 255, 0.05);
      color: #fff;
    }

    .radio-label input {
      display: none;
    }

    .mode-desc {
      font-size: 11px;
      color: #666;
      margin-top: 2px;
    }

    .status-bar {
      font-size: 11px;
      color: #00a3ff;
      text-align: right;
      font-weight: 500;
    }
  </style>
</head>

<body>

  <div class="config-card">
    <div class="card-header">
      <span>✨ FX Particle Controller</span>
    </div>

    <div class="section-title">Motion Effect Type</div>

    <div class="radio-group">
      <label class="radio-label" id="lbl-quantum">
        <div>
          <div>Quantum Trail</div>
          <div class="mode-desc">Standard high-tech linear fading sparks</div>
        </div>
        <input type="radio" name="fx-type" value="quantum" onchange="switchFX('quantum')">
      </label>

      <label class="radio-label" id="lbl-float">
        <div>
          <div>Anti-Gravity</div>
          <div class="mode-desc">Particles float upward gently like cyber smoke</div>
        </div>
        <input type="radio" name="fx-type" value="float" onchange="switchFX('float')">
      </label>

      <label class="radio-label" id="lbl-burst">
        <div>
          <div>Supernova Burst</div>
          <div class="mode-desc">Explosive high-velocity matrix radiation</div>
        </div>
        <input type="radio" name="fx-type" value="burst" onchange="switchFX('burst')">
      </label>
    </div>

    <div class="status-bar" id="status-text">EFFECT ARMED</div>
  </div>

  <script>
    // 初始化时同步本地缓存的特效类型
    const currentFX = localStorage.getItem("aicupa_cursor_fx") || "quantum";
    document.querySelector(`input[value="${currentFX}"]`).checked = true;
    document.getElementById(`lbl-${currentFX}`).classList.add("active");

    function switchFX(type) {
      // 切换高亮样式
      document.querySelectorAll('.radio-label').forEach(el => el.classList.remove('active'));
      document.getElementById(`lbl-${type}`).classList.add("active");

      // 写入持久化缓存
      localStorage.setItem("aicupa_cursor_fx", type);

      // 实时广播跨域消息通知主应用 inject.js 实时热更新物理模型
      window.parent.postMessage({ type: 'plugin-call', method: 'syncCursorFXType', fx: type }, '*');

      const status = document.getElementById("status-text");
      status.innerText = "FX RE-CALIBRATED";
      setTimeout(() => { status.innerText = "EFFECT ARMED"; }, 1500);
    }
  </script>
</body>

</html>
